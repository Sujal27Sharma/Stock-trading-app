<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NEXUS Trading</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0d0e12; 
            color: #e0e0e0; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
        }
        .login-card { 
            background-color: #15171e; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #2a2d3a; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { font-size: 2em; font-weight: bold; color: white; margin-bottom: 30px; }
        .logo span { color: #00E676; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #888; font-size: 0.9em; }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            background-color: #0b0c10; 
            border: 1px solid #2a2d3a; 
            border-radius: 6px; 
            color: white; 
            box-sizing: border-box; 
        }
        .login-btn { 
            width: 100%; 
            background-color: #00E676; 
            color: black; 
            border: none; 
            padding: 15px; 
            border-radius: 6px; 
            font-size: 1.1em; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><span>⬡</span> NEXUS</div>
        <p style="color: #888; margin-bottom: 30px;">Sign in to access your trading terminal</p>
        
        <form method="POST" action="/">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="sujal@skillwallet.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Secure Sign In</button>
        </form>
    </div>
</body>
</html>
